<style>
/* ===== RESET & BASE ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0a1628;--navy-light:#0f1f3a;--navy-mid:#162a4a;
  --gold:#c9a96e;--gold-light:#ddc08a;--gold-dim:rgba(201,169,110,.15);
  --white:#f0ece4;--white-pure:#fff;--gray:#8a94a6;--gray-light:#b0b8c8;
  --green:#34d399;--red:#f87171;--orange:#fbbf24;
  --card-bg:#111d32;--card-border:rgba(201,169,110,.12);
  --radius:12px;--radius-sm:8px;
  --font:'Segoe UI','Helvetica Neue',Arial,sans-serif;
  --transition:all .25s ease;
}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:var(--font);background:var(--navy);color:var(--white);line-height:1.6;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;padding-bottom:72px}
a{color:var(--gold);text-decoration:none;transition:var(--transition)}
a:hover{color:var(--gold-light)}
img{max-width:100%;display:block}
button{cursor:pointer;font-family:var(--font);border:none;background:none;color:inherit}

/* ===== HEADER ===== */
.header{position:sticky;top:0;z-index:1000;background:rgba(10,22,40,.96);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--card-border);padding:0 16px}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;
  justify-content:space-between;height:56px}
.logo{font-size:1.4rem;font-weight:700;letter-spacing:-.5px;color:var(--white)}
.logo span{color:var(--gold)}
.header-right{display:flex;align-items:center;gap:12px}
.lang-select{display:flex;align-items:center;gap:6px;background:var(--navy-mid);
  border:1px solid var(--card-border);border-radius:var(--radius-sm);padding:6px 10px;
  font-size:.8rem;color:var(--gray-light);cursor:pointer;position:relative}
.lang-select svg{width:16px;height:16px;opacity:.7}
.lang-select select{appearance:none;background:none;border:none;color:var(--white);
  font-size:.8rem;font-family:var(--font);cursor:pointer;padding-right:4px}
.lang-select select option{background:var(--navy);color:var(--white)}

/* ===== MAP ===== */
.map-container{width:100%;height:35vh;min-height:200px;position:relative}
#map{width:100%;height:100%;z-index:1}
.leaflet-container{background:var(--navy)!important}
.map-overlay{position:absolute;bottom:12px;left:12px;z-index:500;
  background:rgba(10,22,40,.85);backdrop-filter:blur(8px);
  border-radius:var(--radius-sm);padding:8px 12px;display:flex;gap:12px;
  font-size:.75rem;color:var(--gray-light)}
.map-legend-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}

/* ===== MAIN CONTENT ===== */
.main{max-width:1200px;margin:0 auto;padding:16px}
.section-title{font-size:1.1rem;font-weight:600;color:var(--white);margin-bottom:12px;
  display:flex;align-items:center;gap:8px}
.section-title svg{color:var(--gold);width:20px;height:20px}

/* ===== BEST THIS MONTH ===== */
.best-month-header{display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;flex-wrap:wrap;gap:8px}
.best-month-header h2{font-size:1.25rem;font-weight:700;color:var(--white)}
.best-month-header h2 span{color:var(--gold)}
.month-nav{display:flex;gap:4px}
.month-nav button{padding:6px 12px;border-radius:var(--radius-sm);font-size:.75rem;
  font-weight:600;background:var(--navy-mid);color:var(--gray-light);
  border:1px solid transparent;transition:var(--transition)}
.month-nav button.active{background:var(--gold-dim);color:var(--gold);
  border-color:var(--gold)}

/* ===== HORIZONTAL SCROLL CARDS ===== */
.hscroll{display:flex;gap:12px;overflow-x:auto;scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;padding-bottom:8px;margin:0 -16px;padding-left:16px;padding-right:16px}
.hscroll::-webkit-scrollbar{display:none}
.hscroll .spot-card{min-width:280px;max-width:300px;scroll-snap-align:start;flex-shrink:0}

/* ===== SPOT CARDS ===== */
.spot-card{background:var(--card-bg);border:1px solid var(--card-border);
  border-radius:var(--radius);overflow:hidden;transition:var(--transition);cursor:pointer}
.spot-card:hover{border-color:rgba(201,169,110,.3);transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(0,0,0,.3)}
.card-header{padding:16px 16px 12px;position:relative}
.card-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.tag{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
  padding:3px 8px;border-radius:4px}
.tag-trending{background:rgba(251,191,36,.15);color:var(--orange)}
.tag-featured{background:rgba(52,211,153,.15);color:var(--green)}
.tag-partner{background:var(--gold-dim);color:var(--gold)}
.card-name{font-size:1.1rem;font-weight:700;color:var(--white);margin-bottom:2px}
.card-country{font-size:.8rem;color:var(--gray)}
.card-wind-score{display:flex;align-items:center;gap:8px;margin-top:10px}
.wind-bar-bg{flex:1;height:6px;background:var(--navy);border-radius:3px;overflow:hidden}
.wind-bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
.wind-score-num{font-size:.85rem;font-weight:700;min-width:32px;text-align:right}
.card-meta{display:flex;gap:12px;padding:0 16px 12px;font-size:.75rem;color:var(--gray)}
.card-meta-item{display:flex;align-items:center;gap:4px}
.card-meta-item svg{width:14px;height:14px;opacity:.6}

/* ===== EXPANDED CARD / DETAIL ===== */
.card-detail{max-height:0;overflow:hidden;transition:max-height .4s ease}
.card-detail.open{max-height:1200px}
.detail-inner{padding:0 16px 16px;border-top:1px solid var(--card-border);margin-top:8px;padding-top:12px}
.detail-section{margin-bottom:14px}
.detail-section h4{font-size:.8rem;font-weight:600;color:var(--gold);
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.detail-section p{font-size:.85rem;color:var(--gray-light);line-height:1.5}

/* Monthly calendar */
.month-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px}
.month-cell{text-align:center;padding:6px 2px;border-radius:4px;font-size:.65rem;font-weight:600}
.month-cell .mlabel{display:block;color:var(--gray);margin-bottom:2px;font-weight:400}
.mwind-good{background:rgba(52,211,153,.12);color:var(--green)}
.mwind-ok{background:rgba(251,191,36,.12);color:var(--orange)}
.mwind-bad{background:rgba(248,113,113,.1);color:var(--red)}
.mwind-current{outline:2px solid var(--gold);outline-offset:-1px}

/* Action buttons */
.action-btns{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.action-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;
  border-radius:var(--radius-sm);font-size:.8rem;font-weight:600;transition:var(--transition)}
.btn-gold{background:var(--gold);color:var(--navy)}
.btn-gold:hover{background:var(--gold-light)}
.btn-outline{background:transparent;border:1px solid var(--card-border);color:var(--gray-light)}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}

/* ===== REGION SECTIONS ===== */
.region{margin-top:28px}
.region-header{display:flex;align-items:center;justify-content:space-between;
  padding:12px 0;border-bottom:1px solid var(--card-border);cursor:pointer;
  user-select:none;-webkit-tap-highlight-color:transparent}
.region-header h3{font-size:1rem;font-weight:700;color:var(--white);display:flex;align-items:center;gap:8px}
.region-header .region-count{font-size:.75rem;color:var(--gray);font-weight:400}
.region-chevron{width:20px;height:20px;color:var(--gray);transition:transform .3s ease}
.region-header.open .region-chevron{transform:rotate(180deg)}
.region-spots{display:grid;grid-template-columns:1fr;gap:12px;padding-top:12px;
  overflow:hidden;transition:max-height .4s ease,opacity .3s ease}
.region-spots.collapsed{max-height:0!important;opacity:0;padding-top:0;overflow:hidden}

@media(min-width:640px){
  .region-spots{grid-template-columns:repeat(2,1fr)}
}
@media(min-width:960px){
  .region-spots{grid-template-columns:repeat(3,1fr)}
  .map-container{height:40vh}
}

/* ===== TERRA VENTOS CTA ===== */
.tv-cta{background:linear-gradient(135deg,var(--navy-mid),var(--navy-light));
  border:1px solid var(--gold);border-radius:var(--radius);padding:24px;
  margin:28px 0;text-align:center;position:relative;overflow:hidden}
.tv-cta::before{content:'';position:absolute;top:-50%;right:-30%;width:200px;height:200px;
  background:radial-gradient(circle,rgba(201,169,110,.08),transparent 70%);pointer-events:none}
.tv-cta h3{font-size:1.1rem;font-weight:700;color:var(--white);margin-bottom:6px}
.tv-cta p{font-size:.85rem;color:var(--gray-light);margin-bottom:16px;max-width:500px;margin-left:auto;margin-right:auto}
.tv-cta .btn-gold{padding:12px 28px;font-size:.9rem;border-radius:var(--radius-sm);display:inline-flex}

/* ===== WHATSAPP WIDGET ===== */
.wa-widget{position:fixed;bottom:80px;right:16px;z-index:900;display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.wa-bubble{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius);
  padding:12px;max-width:220px;box-shadow:0 8px 24px rgba(0,0,0,.4);animation:waSlide .4s ease;
  display:none;position:relative}
.wa-bubble.show{display:block}
.wa-bubble-close{position:absolute;top:6px;right:8px;font-size:.75rem;color:var(--gray);cursor:pointer}
.wa-bubble img{width:40px;height:40px;border-radius:50%;object-fit:cover;margin-bottom:6px}
.wa-bubble p{font-size:.8rem;color:var(--white);margin-bottom:8px;line-height:1.4}
.wa-bubble .btn-gold{padding:8px 14px;font-size:.75rem;border-radius:6px;width:100%;justify-content:center}
.wa-fab{width:56px;height:56px;border-radius:50%;background:#25d366;display:flex;
  align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(37,211,102,.4);
  transition:transform .2s ease}
.wa-fab:hover{transform:scale(1.08)}
.wa-fab svg{width:28px;height:28px;fill:white}
@keyframes waSlide{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ===== BOTTOM NAV (MOBILE) ===== */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:1000;
  background:rgba(10,22,40,.97);backdrop-filter:blur(12px);
  border-top:1px solid var(--card-border);display:flex;height:64px}
.bottom-nav button{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;font-size:.65rem;font-weight:600;color:var(--gray);
  transition:var(--transition);-webkit-tap-highlight-color:transparent}
.bottom-nav button.active{color:var(--gold)}
.bottom-nav button svg{width:22px;height:22px}
@media(min-width:960px){.bottom-nav{display:none}body{padding-bottom:0}}

/* ===== FOMO TOAST ===== */
.fomo-toast{position:fixed;bottom:80px;left:16px;z-index:800;background:var(--card-bg);
  border:1px solid var(--card-border);border-radius:var(--radius-sm);padding:10px 14px;
  font-size:.78rem;color:var(--gray-light);box-shadow:0 4px 20px rgba(0,0,0,.4);
  transform:translateY(20px);opacity:0;transition:all .4s ease;pointer-events:none;max-width:300px}
.fomo-toast.show{transform:translateY(0);opacity:1}
.fomo-toast strong{color:var(--white)}

/* ===== FOOTER ===== */
.footer{border-top:1px solid var(--card-border);margin-top:40px;padding:24px 16px;text-align:center}
.footer p{font-size:.78rem;color:var(--gray);margin-bottom:4px}
.footer a{color:var(--gold);font-weight:600}

/* ===== LOADING ===== */
.wind-loading{display:inline-block;width:10px;height:10px;border:2px solid var(--gray);
  border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== VIEW TOGGLE ===== */
.view-tabs{display:flex;gap:2px;background:var(--navy-mid);border-radius:var(--radius-sm);
  padding:2px;margin-bottom:16px;overflow-x:auto}
.view-tab{padding:8px 16px;border-radius:6px;font-size:.8rem;font-weight:600;
  color:var(--gray);white-space:nowrap;transition:var(--transition);
  -webkit-tap-highlight-color:transparent}
.view-tab.active{background:var(--gold-dim);color:var(--gold)}

/* ===== DISTANCE BADGE ===== */
.dist-badge{font-size:.7rem;color:var(--gray);background:var(--navy);padding:2px 8px;
  border-radius:10px;display:inline-flex;align-items:center;gap:3px;margin-top:6px}

/* ===== REAL-TIME WIND DISPLAY ===== */
.rt-wind{display:flex;align-items:center;gap:6px;margin-top:6px;font-size:.78rem}
.rt-wind-val{font-weight:700}
.rt-wind-label{color:var(--gray);font-size:.7rem}
</style>
</head>

// ===== MAP =====
function initMap() {
  map = L.map('map', {zoomControl:false, attributionControl:false}).setView([15, 0], 2);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom:18, subdomains:'abcd'
  }).addTo(map);
  L.control.zoom({position:'topright'}).addTo(map);
}

function updateMapDots() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  SPOTS.forEach(spot => {
    const score = spot.wind[currentMonth];
    const color = score >= 50 ? '#34d399' : '#f87171';
    const marker = L.circleMarker([spot.lat, spot.lng], {
      radius: 7, fillColor: color, fillOpacity: 0.9,
      color: 'rgba(255,255,255,0.3)', weight: 1
    }).addTo(map);
    marker.bindTooltip(`<b>${spot.name}</b><br>${score}/100`, {
      className:'custom-tooltip', direction:'top', offset:[0,-8]
    });
    marker.on('click', () => {
      const el = document.getElementById('card-' + spot.id);
      if (el) { el.scrollIntoView({behavior:'smooth',block:'center'}); toggleCard(spot.id); }
    });
    markers.push(marker);
  });
}

// ===== GEOLOCATION =====
function getUserLocation() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(pos => {
    userLat = pos.coords.latitude;
    userLng = pos.coords.longitude;
    guessAirport();
    render();
  }, () => {});
}

function guessAirport() {
  // Simple nearest major hub
  const airports = [
    {code:'GRU',lat:-23.43,lng:-46.47},{code:'JFK',lat:40.64,lng:-73.78},
    {code:'MIA',lat:25.79,lng:-80.29},{code:'LHR',lat:51.47,lng:-0.46},
    {code:'CDG',lat:49.01,lng:2.55},{code:'FRA',lat:50.03,lng:8.57},
    {code:'DXB',lat:25.25,lng:55.36},{code:'SIN',lat:1.35,lng:103.99},
    {code:'LAX',lat:33.94,lng:-118.41},{code:'FOR',lat:-3.78,lng:-38.53},
    {code:'LIS',lat:38.77,lng:-9.13},{code:'MAD',lat:40.47,lng:-3.57},
    {code:'EZE',lat:-34.82,lng:-58.54},{code:'BOG',lat:4.70,lng:-74.15},
    {code:'MEX',lat:19.44,lng:-99.07},{code:'YYZ',lat:43.68,lng:-79.63},
    {code:'SYD',lat:-33.95,lng:151.18},{code:'NRT',lat:35.77,lng:140.39}
  ];
  if (!userLat) return;
  let best = airports[0], bestDist = Infinity;
  airports.forEach(a => {
    const d = haversine(userLat, userLng, a.lat, a.lng);
    if (d < bestDist) { bestDist = d; best = a; }
  });
  userAirport = best.code;
}

function haversine(lat1,lon1,lat2,lon2) {
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function getDistance(spot) {
  if (!userLat) return null;
  return Math.round(haversine(userLat, userLng, spot.lat, spot.lng));
}

// ===== WIND API =====
async function fetchAllWind() {
  const batches = [];
  for (let i = 0; i < SPOTS.length; i += 5) {
    batches.push(SPOTS.slice(i, i + 5));
  }
  for (const batch of batches) {
    await Promise.all(batch.map(async spot => {
      try {
        const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${spot.lat}&longitude=${spot.lng}&current=wind_speed_10m,wind_gusts_10m,wind_direction_10m&wind_speed_unit=kn&timezone=auto`);
        const d = await r.json();
        if (d.current) {
          windData[spot.id] = {
            speed: Math.round(d.current.wind_speed_10m),
            gusts: Math.round(d.current.wind_gusts_10m),
            dir: d.current.wind_direction_10m
          };
          updateWindDisplay(spot.id);
        }
      } catch(e) {}
    }));
  }
  updateMapDots();
}

function updateWindDisplay(id) {
  const el = document.querySelector(`[data-wind-id="${id}"]`);
  if (el && windData[id]) {
    el.innerHTML = `<span class="rt-wind-val" style="color:${windData[id].speed>=15?'var(--green)':'var(--gray-light)'}">${windData[id].speed}</span> <span class="rt-wind-label">${t('knots')} · G${windData[id].gusts}</span>`;
  }
}

// ===== RENDER =====
function render() {
  document.getElementById('currentMonthName').textContent = MONTH_FULL[lang][currentMonth];
  renderBestMonth();
  renderRegions();
  updateMapDots();
}

function renderBestMonth() {
  const sorted = [...SPOTS].sort((a,b) => b.wind[currentMonth] - a.wind[currentMonth]);
  const best = sorted.filter(s => s.wind[currentMonth] >= 50).slice(0, 8);
  const container = document.getElementById('bestCards');
  container.innerHTML = best.map(spot => buildCard(spot, true)).join('');
}

function renderRegions() {
  const container = document.getElementById('regionsList');
  let html = '';
  REGIONS.forEach((region, ri) => {
    const spots = SPOTS.filter(s => s.region === region.id);
    const avgScore = Math.round(spots.reduce((s,sp) => s + sp.wind[currentMonth], 0) / spots.length);
    html += `
      <div class="region" id="region-${region.id}">
        <div class="region-header open" onclick="toggleRegion('${region.id}')">
          <h3>${region.emoji} ${region.name[lang]} <span class="region-count">${spots.length} ${t('spots')} · avg ${avgScore}/100</span></h3>
          <svg class="region-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
        </div>
        <div class="region-spots" id="spots-${region.id}" style="max-height:2000px">
          ${spots.map(s => buildCard(s, false)).join('')}
        </div>
      </div>`;
    // Insert Terra Ventos CTA after Brazil NE
    if (region.id === 'brazil_ne') {
      html += `
        <div class="tv-cta">
          <h3 data-i18n="tv_cta_title">${t('tv_cta_title')}</h3>
          <p data-i18n="tv_cta_text">${t('tv_cta_text')}</p>
          <a href="https://terraventos.com" target="_blank" rel="noopener" class="action-btn btn-gold" data-i18n="tv_cta_btn">${t('tv_cta_btn')}</a>
        </div>`;
    }
  });
  container.innerHTML = html;
}

function buildCard(spot, isHorizontal) {
  const score = spot.wind[currentMonth];
  const barColor = score >= 70 ? 'var(--green)' : score >= 50 ? 'var(--orange)' : 'var(--red)';
  const dist = getDistance(spot);
  const distHtml = dist ? `<div class="dist-badge">✈ ${dist.toLocaleString()} km ${t('from_you')}</div>` : '';

  const tagsHtml = spot.tags.map(tag => {
    if (tag === 'trending') return `<span class="tag tag-trending">Trending</span>`;
    if (tag === 'featured') return `<span class="tag tag-featured">Featured</span>`;
    if (tag === 'partner') return `<span class="tag tag-partner">Partner</span>`;
    return '';
  }).join('');

  // Monthly calendar
  const monthsHtml = spot.wind.map((w, i) => {
    const cls = w >= 70 ? 'mwind-good' : w >= 50 ? 'mwind-ok' : 'mwind-bad';
    const cur = i === currentMonth ? ' mwind-current' : '';
    return `<div class="month-cell ${cls}${cur}"><span class="mlabel">${MONTH_NAMES[lang][i]}</span>${w}</div>`;
  }).join('');

  // Accommodation
  const accHtml = spot.accommodation.map(a => {
    const url = `https://www.booking.com/searchresults.html?ss=${encodeURIComponent(a.n + ' ' + spot.name)}`;
    const badge = a.featured ? ` <span class="tag tag-partner" style="font-size:.6rem;vertical-align:middle">${t('featured_at')}</span>` : '';
    return `<a href="${url}" target="_blank" rel="noopener" style="display:block;margin-bottom:4px;font-size:.85rem">${a.n}${badge}</a>`;
  }).join('');

  // Flights
  const flightUrl = userAirport
    ? `https://www.google.com/travel/flights?q=flights+from+${userAirport}+to+${spot.airport}`
    : `https://www.google.com/travel/flights?q=flights+to+${spot.airport}`;
  const flightLabel = userAirport ? `${t('search_flights')} (${userAirport} → ${spot.airport})` : `${t('search_flights')} → ${spot.airport}`;

  return `
    <div class="spot-card" id="card-${spot.id}">
      <div class="card-header" onclick="toggleCard('${spot.id}')">
        ${tagsHtml ? `<div class="card-tags">${tagsHtml}</div>` : ''}
        <div class="card-name">${spot.name}</div>
        <div class="card-country">${spot.country}</div>
        <div class="card-wind-score">
          <div class="wind-bar-bg"><div class="wind-bar-fill" style="width:${score}%;background:${barColor}"></div></div>
          <div class="wind-score-num" style="color:${barColor}">${score}</div>
        </div>
        <div class="rt-wind" data-wind-id="${spot.id}">
          ${windData[spot.id] ? `<span class="rt-wind-val" style="color:${windData[spot.id].speed>=15?'var(--green)':'var(--gray-light)'}">${windData[spot.id].speed}</span> <span class="rt-wind-label">${t('knots')} · G${windData[spot.id].gusts}</span>` : `<span class="wind-loading"></span>`}
        </div>
        ${distHtml}
      </div>
      <div class="card-detail" id="detail-${spot.id}">
        <div class="detail-inner">
          <div class="detail-section">
            <p>${spot.desc[lang] || spot.desc.en}</p>
          </div>
          <div class="detail-section">
            <h4>${t('water')}</h4>
            <p>${spot.waterType}</p>
          </div>
          <div class="detail-section">
            <h4>${t('monthly_cal')}</h4>
            <div class="month-grid">${monthsHtml}</div>
          </div>
          <div class="detail-section">
            <h4>${t('where_stay')}</h4>
            ${accHtml}
          </div>
          <div class="action-btns">
            <a href="${flightUrl}" target="_blank" rel="noopener" class="action-btn btn-gold">✈ ${flightLabel}</a>
            <a href="https://www.booking.com/searchresults.html?ss=${encodeURIComponent(spot.name + ' ' + spot.country)}" target="_blank" rel="noopener" class="action-btn btn-outline">🏨 ${t('book_stay')}</a>
          </div>
        </div>
      </div>
    </div>`;
}

// ===== INTERACTIONS =====
function toggleCard(id) {
  const el = document.getElementById('detail-' + id);
  if (el) el.classList.toggle('open');
}

function toggleRegion(id) {
  const header = document.querySelector(`#region-${id} .region-header`);
  const spots = document.getElementById('spots-' + id);
  header.classList.toggle('open');
  spots.classList.toggle('collapsed');
}

function switchView(view) {
  document.querySelectorAll('.bottom-nav button').forEach(b => {
    b.classList.toggle('active', b.dataset.view === view);
  });
  if (view === 'rankings') {
    document.getElementById('bestMonth').scrollIntoView({behavior:'smooth'});
  } else {
    window.scrollTo({top:0,behavior:'smooth'});
  }
}

// ===== WHATSAPP =====
function toggleWaBubble() {
  document.getElementById('waBubble').classList.toggle('show');
}
function showWaBubble() {
  document.getElementById('waBubble').classList.add('show');
  setTimeout(() => document.getElementById('waBubble').classList.remove('show'), 8000);
}

];
let fomoIdx = 0;
function startFomo() {
  setInterval(() => {
    const toast = document.getElementById('fomoToast');
    const msg = fomoMessages[fomoIdx % fomoMessages.length];
    toast.innerHTML = msg[lang] || msg.en;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 4000);
    fomoIdx++;
  }, 25000);
}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GoWind — Find Your Next Wind</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a1628;color:#e2e8f0;overflow-x:hidden}
.header{background:#0f2035;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1a3a5c;position:sticky;top:0;z-index:1000}
.logo{font-size:22px;font-weight:800;color:#c9a96e;letter-spacing:1px}
.logo span{color:#22c55e}
.live-badge{background:#16a34a22;border:1px solid #22c55e;color:#22c55e;padding:4px 10px;border-radius:20px;font-size:11px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.social-proof{background:linear-gradient(90deg,#c9a96e22,#0f2035);padding:6px 16px;font-size:12px;color:#c9a96e;text-align:center}
#map{height:55vh;width:100%;min-height:300px}
.tabs{display:flex;background:#0f2035;border-bottom:1px solid #1a3a5c}
.tab{flex:1;padding:10px;text-align:center;cursor:pointer;font-size:13px;font-weight:600;color:#94a3b8;border-bottom:2px solid transparent;transition:.2s}
.tab.active{color:#c9a96e;border-bottom-color:#c9a96e}
.cards{padding:12px;display:grid;gap:10px;max-height:40vh;overflow-y:auto}
.card{background:#0f2035;border:1px solid #1a3a5c;border-radius:10px;padding:14px;cursor:pointer;transition:.2s}
.card:hover{border-color:#c9a96e}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.card-name{font-weight:700;font-size:15px}
.card-country{color:#94a3b8;font-size:12px}
.wind-score{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px}
.score-high{background:#16a34a33;color:#22c55e;border:2px solid #22c55e}
.score-mid{background:#ca8a0433;color:#eab308;border:2px solid #eab308}
.score-low{background:#dc262633;color:#ef4444;border:2px solid #ef4444}
.card-stats{display:flex;gap:12px;font-size:12px;color:#94a3b8;margin-top:6px}
.card-stats span{display:flex;align-items:center;gap:4px}
.trending{background:#c9a96e22;color:#c9a96e;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.panel{position:fixed;top:0;right:-100%;width:min(420px,90vw);height:100vh;background:#0a1628;border-left:1px solid #1a3a5c;z-index:2000;overflow-y:auto;transition:right .3s ease;padding:0}
.panel.open{right:0}
.panel-header{background:#0f2035;padding:16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:1}
.panel-close{background:none;border:none;color:#94a3b8;font-size:24px;cursor:pointer}
.panel-body{padding:16px}
.panel-score{text-align:center;margin:16px 0}
.panel-score .big{font-size:64px;font-weight:900}
.forecast-grid{display:grid;gap:6px;margin:12px 0}
.forecast-day{background:#0f2035;border:1px solid #1a3a5c;border-radius:8px;padding:10px;display:flex;justify-content:space-between;align-items:center;font-size:13px}
.forecast-day.best{border-color:#22c55e;background:#16a34a11}
.wind-bar{height:6px;border-radius:3px;margin-top:4px}
.featured{background:linear-gradient(135deg,#c9a96e22,#0f2035);border:1px solid #c9a96e;border-radius:10px;padding:12px;margin:12px 0}
.featured-badge{background:#c9a96e;color:#0a1628;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:800}
.whatsapp-btn{background:#25D366;color:#fff;border:none;border-radius:8px;padding:14px;width:100%;font-size:15px;font-weight:700;cursor:pointer;margin-top:12px;display:flex;align-items:center;justify-content:center;gap:8px}
.whatsapp-float{position:fixed;bottom:20px;right:20px;background:#25D366;color:#fff;width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;z-index:999;box-shadow:0 4px 12px #00000066;text-decoration:none}
.toast{position:fixed;bottom:80px;left:16px;background:#0f2035;border:1px solid #1a3a5c;border-radius:8px;padding:10px 16px;font-size:12px;color:#94a3b8;z-index:3000;animation:slideIn .4s ease;max-width:300px}
@keyframes slideIn{from{transform:translateX(-100%);opacity:0}to{transform:translateX(0);opacity:1}}
.countdown{text-align:center;padding:8px;background:#c9a96e11;font-size:11px;color:#c9a96e}
.overlay{position:fixed;inset:0;background:#00000088;z-index:1999;display:none}
.overlay.open{display:block}
.rankings{padding:12px}
.rank-section{margin-bottom:16px}
.rank-title{font-size:14px;font-weight:700;color:#c9a96e;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.loading{text-align:center;padding:40px;color:#94a3b8}
.spinner{border:3px solid #1a3a5c;border-top:3px solid #c9a96e;border-radius:50%;width:30px;height:30px;animation:spin 1s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.flight-info{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0;font-size:12px}
.flight-card{background:#0f2035;border:1px solid #1a3a5c;border-radius:6px;padding:8px;text-align:center}
.flight-card .price{color:#22c55e;font-weight:700;font-size:16px}
.distance-info{background:#0f2035;border-radius:8px;padding:10px;margin:8px 0;text-align:center;font-size:13px}
.distance-info .km{color:#c9a96e;font-size:20px;font-weight:800}
</style>
</head>
<body>
<div class="header">
  <div class="logo">Go<span>Wind</span> <span style="font-size:14px">🌊</span></div>
  <div class="live-badge" id="liveBadge">● LOADING DATA...</div>
</div>
<div class="social-proof">🏄 <span id="userCount">847</span> kitesurfers planning their next trip</div>
<div class="countdown" id="countdown"></div>
<div id="map"></div>
<div class="tabs">
  <div class="tab active" onclick="showTab('discover')">🗺️ Discover</div>
  <div class="tab" onclick="showTab('rankings')">🏆 Rankings</div>
</div>
<div id="discoverTab"><div class="cards" id="cards"><div class="loading"><div class="spinner"></div>Fetching live wind data from 11 spots...</div></div></div>
<div id="rankingsTab" style="display:none"><div class="rankings" id="rankingsContent"></div></div>
<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel"><div class="panel-header"><div style="font-weight:700" id="panelTitle">Destination</div><button class="panel-close" onclick="closePanel()">×</button></div><div class="panel-body" id="panelBody"></div></div>
<a class="whatsapp-float" href="https://wa.me/5585985572807?text=Hey%20GoWind!%20I%20want%20to%20plan%20a%20kitesurf%20trip." target="_blank">💬</a>
<div class="toast" id="toast" style="display:none"></div>

<script>
const SPOTS=[
{name:"Preá",country:"Brazil",lat:-2.79,lng:-40.41,vibe:"World-class flat water, Jericoacoara gateway",reliability:92,flights:{NYC:850,London:780,SP:420,Berlin:820},featured:{name:"Terra Ventos Kite House",price:"from $120/night",desc:"3BR beachfront, 6 guests",link:"https://www.airbnb.com.br/rooms/1613864657831968386"}},
{name:"Tatajuba",country:"Brazil",lat:-2.85,lng:-40.55,vibe:"Lagoon kiteboarding, downwind corridors",reliability:88,flights:{NYC:880,London:800,SP:440,Berlin:840}},
{name:"Jericoacoara",country:"Brazil",lat:-2.80,lng:-40.51,vibe:"Iconic village, waves + flat water",reliability:90,flights:{NYC:830,London:760,SP:400,Berlin:800}},
{name:"Cumbuco",country:"Brazil",lat:-3.63,lng:-38.73,vibe:"Close to Fortaleza, consistent wind",reliability:85,flights:{NYC:700,London:680,SP:350,Berlin:720}},
{name:"Ilha do Guajiru",country:"Brazil",lat:-2.94,lng:-39.26,vibe:"Flat water lagoon, uncrowded",reliability:87,flights:{NYC:750,London:710,SP:380,Berlin:750}},
{name:"Cabarete",country:"Dominican Republic",lat:19.76,lng:-70.41,vibe:"Caribbean vibes, waves + flat",reliability:75,flights:{NYC:350,London:550,SP:680,Berlin:600}},
{name:"Tarifa",country:"Spain",lat:36.01,lng:-5.60,vibe:"Europe's wind capital, Strait of Gibraltar",reliability:82,flights:{NYC:500,London:120,SP:650,Berlin:180}},
{name:"Aruba",country:"Caribbean",lat:12.51,lng:-69.97,vibe:"Trade winds, turquoise water",reliability:88,flights:{NYC:300,London:600,SP:750,Berlin:650}},
{name:"Dakhla",country:"Morocco",lat:23.72,lng:-15.93,vibe:"Desert lagoon, epic flat water",reliability:90,flights:{NYC:700,London:350,SP:800,Berlin:400}},
{name:"Cape Town",country:"South Africa",lat:-33.92,lng:18.42,vibe:"Big waves, Table Mountain backdrop",reliability:78,flights:{NYC:900,London:650,SP:850,Berlin:700}},
{name:"Los Roques",country:"Venezuela",lat:11.95,lng:-66.67,vibe:"Remote archipelago, crystal water",reliability:80,flights:{NYC:500,London:700,SP:600,Berlin:750}}
];

let userLat=null,userLng=null,userCity="Unknown",windData={},map;
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

// Init map
map=L.map('map',{zoomControl:false}).setView([15,-20],2);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'GoWind',maxZoom:18}).addTo(map);

// Geolocation
if(navigator.geolocation){
  navigator.geolocation.getCurrentPosition(p=>{
    userLat=p.coords.latitude;userLng=p.coords.longitude;
    fetch(`https://nominatim.openstreetmap.org/reverse?lat=${userLat}&lon=${userLng}&format=json`).then(r=>r.json()).then(d=>{
      userCity=d.address?.city||d.address?.town||d.address?.state||"your location";
      document.getElementById('userCount').textContent=`847 kitesurfers planning trips — you're in ${userCity}`;
      if(Object.keys(windData).length>0)renderAll();
    }).catch(()=>{});
    L.circleMarker([userLat,userLng],{radius:8,color:'#c9a96e',fillColor:'#c9a96e',fillOpacity:.8}).addTo(map).bindPopup('📍 You are here');
    map.setView([userLat,userLng],3);
  },()=>{});
}

// Distance calc
function dist(lat1,lon1,lat2,lon2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// Fetch wind PROGRESSIVELY (one by one, render as each loads)
let loadedCount=0;
async function fetchWind(){
  // Show map + skeleton cards immediately
  const cardsEl=document.getElementById('cards');
  cardsEl.innerHTML=SPOTS.map(s=>`<div class="card" style="opacity:.5">
    <div class="card-header"><div><div class="card-name">${s.name}</div><div class="card-country">${s.country}</div></div><div class="wind-score" style="background:#1a3a5c;color:#94a3b8;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;border:2px solid #1a3a5c">...</div></div>
    <div style="font-size:12px;color:#94a3b8">${s.vibe}</div>
  </div>`).join('');
  // Add basic markers immediately
  SPOTS.forEach(s=>{
    const icon=L.divIcon({className:'',html:`<div style="background:#1a3a5c;border:2px solid #94a3b8;color:#94a3b8;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:10px">...</div>`});
    L.marker([s.lat,s.lng],{icon}).addTo(map).on('click',()=>openPanel(s.name));
  });
  // Fetch each spot sequentially to avoid overload
  for(const s of SPOTS){
    try{
      const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${s.lat}&longitude=${s.lng}&hourly=windspeed_10m,winddirection_10m,windgusts_10m,temperature_2m&forecast_days=7&windspeed_unit=kn`);
      windData[s.name]=await r.json();
    }catch(e){windData[s.name]=null;}
    loadedCount++;
    document.getElementById('liveBadge').innerHTML=`● LIVE — ${loadedCount}/11 spots loaded`;
    renderAll(); // Re-render after each spot loads
  }
}

function calcScore(name){
  const d=windData[name];if(!d||!d.hourly)return 0;
  const ws=d.hourly.windspeed_10m.slice(0,168);
  const kiteHours=ws.filter(w=>w>=15&&w<=25).length;
  return Math.min(100,Math.round((kiteHours/168)*200));
}

function getDailyForecast(name){
  const d=windData[name];if(!d||!d.hourly)return[];
  const days=[];
  for(let i=0;i<7;i++){
    const slice=d.hourly.windspeed_10m.slice(i*24,(i+1)*24);
    const gusts=d.hourly.windgusts_10m.slice(i*24,(i+1)*24);
    const temps=d.hourly.temperature_2m.slice(i*24,(i+1)*24);
    const dirs=d.hourly.winddirection_10m.slice(i*24,(i+1)*24);
    const avg=slice.reduce((a,b)=>a+b,0)/24;
    const max=Math.max(...slice);const min=Math.min(...slice);
    const maxGust=Math.max(...gusts);
    const avgTemp=temps.reduce((a,b)=>a+b,0)/24;
    const kh=slice.filter(w=>w>=15&&w<=25).length;
    const date=new Date(d.hourly.time[i*24]);
    const dirNames=['N','NE','E','SE','S','SW','W','NW'];
    const avgDir=dirs.reduce((a,b)=>a+b,0)/24;
    const dirName=dirNames[Math.round(avgDir/45)%8];
    days.push({day:DAYS[date.getDay()],date:date.toLocaleDateString('en',{month:'short',day:'numeric'}),avg:avg.toFixed(1),min:min.toFixed(0),max:max.toFixed(0),gust:maxGust.toFixed(0),temp:avgTemp.toFixed(0),kiteHours:kh,dir:dirName});
  }
  return days;
}

function scoreClass(s){return s>=70?'score-high':s>=50?'score-mid':'score-low'}
function scoreColor(s){return s>=70?'#22c55e':s>=50?'#eab308':'#ef4444'}

let markersLayer=L.layerGroup().addTo(map);let linesDrawn=false;
function renderAll(){
  // Update markers with scores
  markersLayer.clearLayers();
  SPOTS.forEach(s=>{
    const sc=calcScore(s.name);
    const col=windData[s.name]?scoreColor(sc):'#94a3b8';
    const label=windData[s.name]?sc:'...';
    const icon=L.divIcon({className:'',html:`<div style="background:${col}33;border:2px solid ${col};color:${col};width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px">${label}</div>`});
    L.marker([s.lat,s.lng],{icon}).addTo(markersLayer).on('click',()=>openPanel(s.name));
    if(userLat&&!linesDrawn)L.polyline([[userLat,userLng],[s.lat,s.lng]],{color:'#1a3a5c',weight:1,dashArray:'5,10',opacity:.3}).addTo(map);
  });
  if(userLat)linesDrawn=true;

  // Cards
  const sorted=[...SPOTS].sort((a,b)=>calcScore(b.name)-calcScore(a.name));
  const cardsEl=document.getElementById('cards');
  cardsEl.innerHTML=sorted.map(s=>{
    const sc=calcScore(s.name);
    const d=userLat?dist(userLat,userLng,s.lat,s.lng):null;
    const searches=Math.floor(Math.random()*200+50);
    return`<div class="card" onclick="openPanel('${s.name}')">
      <div class="card-header">
        <div><div class="card-name">${s.name} ${sc>=75?'<span class="trending">🔥 Trending</span>':''}</div><div class="card-country">${s.country}</div></div>
        <div class="wind-score ${scoreClass(sc)}">${sc}</div>
      </div>
      <div style="font-size:12px;color:#94a3b8;margin:4px 0">${s.vibe}</div>
      <div class="card-stats">
        <span>💨 ${windData[s.name]?.hourly?Math.round(windData[s.name].hourly.windspeed_10m.slice(0,24).reduce((a,b)=>a+b,0)/24):'-'}kn avg</span>
        ${d?`<span>📍 ${Math.round(d).toLocaleString()}km</span>`:''}
        <span>🔍 ${searches} searches</span>
      </div>
    </div>`}).join('');

  // Rankings
  renderRankings(sorted);
}

function renderRankings(sorted){
  const byWind=[...SPOTS].sort((a,b)=>calcScore(b.name)-calcScore(a.name)).slice(0,5);
  const byValue=[...SPOTS].sort((a,b)=>{
    const sa=calcScore(a.name),sb=calcScore(b.name);
    const ca=a.flights.London,cb=b.flights.London;
    return(sb/cb)-(sa/ca);
  }).slice(0,5);
  const byDist=userLat?[...SPOTS].sort((a,b)=>dist(userLat,userLng,a.lat,a.lng)-dist(userLat,userLng,b.lat,b.lng)).slice(0,5):[];

  document.getElementById('rankingsContent').innerHTML=`
    <div class="rank-section"><div class="rank-title">💨 Best Wind This Week</div>
    ${byWind.map((s,i)=>`<div class="card" onclick="openPanel('${s.name}')" style="margin-bottom:6px"><div class="card-header"><div><span style="color:#c9a96e;font-weight:800">#${i+1}</span> ${s.name} <span class="card-country">${s.country}</span></div><div class="wind-score ${scoreClass(calcScore(s.name))}" style="width:36px;height:36px;font-size:14px">${calcScore(s.name)}</div></div></div>`).join('')}
    </div>
    <div class="rank-section"><div class="rank-title">💰 Best Value</div>
    ${byValue.map((s,i)=>`<div class="card" onclick="openPanel('${s.name}')" style="margin-bottom:6px"><div class="card-header"><div><span style="color:#c9a96e;font-weight:800">#${i+1}</span> ${s.name} <span class="card-country">from $${s.flights.London}</span></div><div class="wind-score ${scoreClass(calcScore(s.name))}" style="width:36px;height:36px;font-size:14px">${calcScore(s.name)}</div></div></div>`).join('')}
    </div>
    ${byDist.length?`<div class="rank-section"><div class="rank-title">📍 Closest to You</div>
    ${byDist.map((s,i)=>`<div class="card" onclick="openPanel('${s.name}')" style="margin-bottom:6px"><div class="card-header"><div><span style="color:#c9a96e;font-weight:800">#${i+1}</span> ${s.name} <span class="card-country">${Math.round(dist(userLat,userLng,s.lat,s.lng)).toLocaleString()}km</span></div><div class="wind-score ${scoreClass(calcScore(s.name))}" style="width:36px;height:36px;font-size:14px">${calcScore(s.name)}</div></div></div>`).join('')}
    </div>`:''}`;
}

function openPanel(name){
  const s=SPOTS.find(x=>x.name===name);if(!s)return;
  const sc=calcScore(name);const fc=getDailyForecast(name);
  const d=userLat?dist(userLat,userLng,s.lat,s.lng):null;
  const bestDay=fc.reduce((best,day)=>day.kiteHours>best.kiteHours?day:best,fc[0]);

  document.getElementById('panelTitle').textContent=`${s.name}, ${s.country}`;
  document.getElementById('panelBody').innerHTML=`
    <div class="panel-score"><div class="big" style="color:${scoreColor(sc)}">${sc}</div><div style="color:#94a3b8;font-size:13px">GoWind Score — ${sc>=70?'Epic conditions!':sc>=50?'Good conditions':'Light wind'}</div></div>
    ${d?`<div class="distance-info">📍 <span class="km">${Math.round(d).toLocaleString()}km</span> from ${userCity}</div>`:''}
    <div style="font-size:13px;color:#94a3b8;text-align:center;margin:8px 0">${s.vibe}</div>
    <div style="font-weight:700;margin:12px 0 6px">7-Day Wind Forecast</div>
    <div class="forecast-grid">${fc.map(day=>`
      <div class="forecast-day${day===bestDay?' best':''}">
        <div><div style="font-weight:700">${day.day}</div><div style="font-size:11px;color:#94a3b8">${day.date}</div></div>
        <div style="text-align:center"><div style="font-weight:700">${day.avg}kn ${day.dir}</div><div style="font-size:11px;color:#94a3b8">gusts ${day.gust}kn</div></div>
        <div style="text-align:right"><div>${day.kiteHours}h kite</div><div style="font-size:11px;color:#94a3b8">${day.temp}°C</div></div>
      </div>`).join('')}</div>
    ${bestDay?`<div style="text-align:center;margin:8px 0;font-size:12px;color:#22c55e">⭐ Best day: ${bestDay.day} ${bestDay.date} — ${bestDay.kiteHours} kite hours</div>`:''}
    <div style="font-weight:700;margin:12px 0 6px">Estimated Flights</div>
    <div class="flight-info">${Object.entries(s.flights).map(([city,price])=>`<div class="flight-card"><div style="color:#94a3b8;font-size:11px">From ${city}</div><div class="price">$${price}</div></div>`).join('')}</div>
    ${s.featured?`<div class="featured"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-weight:700">${s.featured.name}</span><span class="featured-badge">⭐ FEATURED</span></div><div style="font-size:12px;color:#94a3b8">${s.featured.desc} — ${s.featured.price}</div><div style="font-size:11px;color:#c9a96e;margin-top:4px">Only 2 featured slots remaining for ${s.name}</div></div>`:''}
    <button class="whatsapp-btn" onclick="window.open('https://wa.me/5585985572807?text=Hey%20GoWind!%20I%27m%20in%20${encodeURIComponent(userCity)}.%20I%20want%20to%20go%20kitesurfing%20in%20${encodeURIComponent(s.name)}%20next%20week.%20Can%20you%20help%3F','_blank')">💬 Plan This Trip on WhatsApp</button>`;
  document.getElementById('panel').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}

function closePanel(){document.getElementById('panel').classList.remove('open');document.getElementById('overlay').classList.remove('open')}
function showTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>{el.classList.toggle('active',i===(t==='discover'?0:1))});
  document.getElementById('discoverTab').style.display=t==='discover'?'block':'none';
  document.getElementById('rankingsTab').style.display=t==='rankings'?'block':'none';
}

// Countdown
const launch=new Date();launch.setDate(launch.getDate()+30);
setInterval(()=>{const diff=launch-new Date();const d=Math.floor(diff/864e5),h=Math.floor(diff%864e5/36e5),m=Math.floor(diff%36e5/6e4);document.getElementById('countdown').textContent=`🚀 GoWind public launch in ${d}d ${h}h ${m}m`;},60000);
document.getElementById('countdown').textContent=`🚀 GoWind public launch in 30 days`;

// FOMO toasts
const toasts=["A kitesurfer from Berlin just searched Preá","A kitesurfer from Paris is looking at Dakhla","A kitesurfer from São Paulo checked Tatajuba","New partner registered in Cabarete","A kitesurfer from London just searched Tarifa","A kitesurfer from Miami is planning Aruba","A rider from Munich checked Cape Town","A kitesurfer from Buenos Aires searched Preá"];
let ti=0;
setInterval(()=>{const el=document.getElementById('toast');el.textContent='🔔 '+toasts[ti%toasts.length];el.style.display='block';setTimeout(()=>el.style.display='none',5000);ti++;},8000);

fetchWind();
